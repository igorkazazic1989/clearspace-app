<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearSpace AI - Declutter Your Digital Life</title>
    <style>
        body { 
            background-color: #020617; 
            color: white; 
            font-family: -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; text-align: center; padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.02);
            padding: 40px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 600px; width: 100%;
        }
        video {
            width: 100%; border-radius: 12px; margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { font-size: 2.5rem; margin: 0 0 10px 0; font-weight: 800; letter-spacing: -1px; }
        p { color: #94a3b8; margin-bottom: 30px; }
        form { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { background: #38bdf8; color: #020617; padding: 12px 24px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <video autoplay muted loop playsinline>
            <source src="Skapa_Promo_Video.mp4" type="video/mp4">
        </video>
        <h1>ClearSpace AI 🫧</h1>
        <p>Experience the future of digital organization. Join the waitlist today.</p>
        <form action="https://formspree.io/f/xvzbylba" method="POST">
            <input type="email" name="email" placeholder="Your email" required>
            <button type="submit">Join</button>
        </form>
    </div>
</body>
</html>
