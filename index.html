<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearSpace AI - Declutter Your Digital Life</title>
    <style>
        body { 
            background-color: #020617; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.02);
            padding: 60px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 500px;
        }
        h1 { font-size: 3rem; margin: 0 0 15px 0; font-weight: 800; letter-spacing: -2px; }
        p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 30px; line-height: 1.5; }
        
        form {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        input[type="email"] {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #0f172a;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input[type="email"]:focus { border-color: #38bdf8; }
        
        button { 
            background: #38bdf8; 
            color: #020617; 
            padding: 14px 28px; 
            border-radius: 12px; 
            font-weight: 700; 
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: #7dd3fc; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>ClearSpace AI 🫧</h1>
        <p>Stop drowning in digital clutter. Be the first to experience the future of AI organization.</p>
        
        <form action="https://formspree.io/f/xvzbylba" method="POST">
            <input type="email" name="email" placeholder="Your email address" required>
            <button type="submit">Join</button>
        </form>
    </div>
</body>
</html>
